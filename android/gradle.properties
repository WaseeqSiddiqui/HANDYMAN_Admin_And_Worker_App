# Network timeout settings (in milliseconds) - 5 minutes for slow connections
systemProp.org.gradle.internal.http.connectionTimeout=300000
systemProp.org.gradle.internal.http.socketTimeout=300000
systemProp.http.socketTimeout=300000
systemProp.http.connectionTimeout=300000

# Gradle daemon and parallel execution for better performance
org.gradle.daemon=true
org.gradle.parallel=true
org.gradle.configureondemand=true

# Increased memory allocation for better build performance
org.gradle.jvmargs=-Xmx4g -Dfile.encoding=UTF-8

# Android configuration
android.useAndroidX=true
android.enableJetifier=true
kotlin.incremental=false

# Enable caching to speed up builds
org.gradle.caching=true

